<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Texas Data Explorer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>texas data explorer</title>

    <link rel="stylesheet" href="css/openapi.css">
</head>

<body>

    <nav>
        <a href="index.html">Portfolio Home</a>
    </nav>

    <h1>texas data explorer</h1>

    <section>

        <h2>American Community Survey Data</h2>

        <p>
            explore selected census estimates for texas using

        </p>

            <button id="populationBtn">

        </div>
